<!doctype html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artist • SSSNET</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/">← Home</a>
<div class="container">
  <div id="artist-root" class="card"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");
if(!id) document.getElementById("artist-root").innerText = "Artist ID missing";

async function loadArtist(){
  const res = await fetch("/artists/" + id);
  if(!res.ok) return document.getElementById("artist-root").innerText = "Artist not found";
  const j = await res.json();
  renderArtist(j);
}

function renderArtist({ artist, news, videos }){
  const root = document.getElementById("artist-root");
  const banner = artist.banner || '/uploads/covers/placeholder.jpg';
  const avatar = artist.avatar || '/uploads/covers/placeholder.jpg';
  const desc = artist.bio || '';
  root.innerHTML = `
    <img class="header-banner" src="${banner}" style="width:100%;height:190px;border-radius:12px;object-fit:cover">
    <div style="display:flex;gap:12px;align-items:center;margin-top:-40px">
      <img src="${avatar}" style="width:84px;height:84px;border-radius:14px;border:3px solid #fff;object-fit:cover">
      <div>
        <h2 style="margin:0">${artist.name}</h2>
        <div class="small-muted">${desc}</div>
      </div>
      <button class="btn" style="margin-left:auto">FOLLOW</button>
    </div>

    <div style="margin-top:12px;display:flex;gap:10px">
      <button class="btn active-tab" id="tabReels" onclick="showTab('reels')">REELS</button>
      <button id="tabNews" onclick="showTab('news')">SNEWS</button>
      <button style="margin-left:auto" onclick="openArtistDashboard(${artist.id})" id="dashBtn">DASHBOARD</button>
    </div>

    <div id="tabContent" style="margin-top:12px"></div>
  `;
  if(artist.status !== 'approved') document.getElementById("dashBtn").style.display = 'none';
  showReels(artist.id);
}

async function showReels(artistId){
  const v = await fetch("/videos").then(r=>r.json());
  const my = v.filter(x=>x.artistId == artistId);
  const tab = document.getElementById("tabContent");
  if(!my.length) tab.innerHTML = "<p>Tidak ada reels.</p>";
  else tab.innerHTML = my.map(video => `
    <div class="card-compact">
      <video src="${video.file}" controls width="100" preload="metadata" style="max-width:100%"></video>
      <div style="margin-top:8px">
        <button class="btn" onclick="toggleLike('video',${video.id})">♥</button>
        <button class="btn" style="background:#666" onclick="openComments('video',${video.id})">💬</button>
      </div>
      <div class="small-muted" style="margin-top:6px">${new Date(video.createdAt).toLocaleString()}</div>
    </div>`).join("");
}

async function showNews(artistId){
  const all = await fetch("/news").then(r=>r.json());
  const mine = all.filter(n=>n.artistId == artistId);
  const tab = document.getElementById("tabContent");
  if(!mine.length) tab.innerHTML = "<p>Tidak ada news.</p>";
  else tab.innerHTML = mine.map(n=>`
    <div class="card-compact">
      <h3>${n.title}</h3>
      <div class="small-muted">${new Date(n.createdAt).toLocaleDateString()}</div>
      <p>${n.body}</p>
      <div style="margin-top:6px">
        <button class="btn" onclick="toggleLike('news',${n.id})">♥</button>
        <button class="btn" style="background:#666" onclick="openComments('news',${n.id})">💬</button>
      </div>
    </div>
  `).join("");
}

function showTab(name){
  document.getElementById("tabReels").classList.toggle("active-tab", name==='reels');
  document.getElementById("tabNews").classList.toggle("active-tab", name==='news');
  if(name==='reels') showReels(id); else showNews(id);
}

function openArtistDashboard(artistId){
  location.href = "/artist_dashboard.html?id=" + artistId;
}

async function toggleLike(type, targetId){ await fetch("/like", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ type, targetId })}); alert("Toggled like"); }
async function openComments(type, targetId){
  const list = await fetch(`/comments?type=${type}&targetId=${targetId}`).then(r=>r.json());
  let out = "Comments:\\n";
  list.forEach(c=> { out += `${c.user.name}: ${c.text} (${new Date(c.createdAt).toLocaleString()})\\n`; if(c.replies) c.replies.forEach(r=> out += `  ↳ ${r.user.name}: ${r.text}\\n`); });
  out += "\\nTulis komentar baru:";
  const text = prompt(out);
  if(text) {
    await fetch("/comments", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ type, targetId, userName: "Anon", text })});
    alert("Komentar terkirim");
  }
}

loadArtist();
</script>
</body>
</html>
