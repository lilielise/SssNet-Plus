<!doctype html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSSNET PLUS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header card">
  <div class="left">
    <img src="/uploads/covers/logo-s.png" id="logo-s" alt="S" onerror="this.style.display='none'">
    <a href="/">Home</a>
    <a href="/news.html">SNEWS</a>
  </div>

  <div class="center">
    <div style="position:relative;">
      <input id="search" placeholder="Cari artis..." autocomplete="off">
      <div id="search-suggestions" class="suggestions" style="display:none"></div>
    </div>
  </div>

  <div class="right">
    <a href="/profile.html" id="profileLink">Login / Daftar</a>
  </div>
</header>

<main style="padding-top:12px;">
  <!-- EVENT di atas -->
  <section id="events" class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Events</h2>
      <div>
        <button class="tab-btn" onclick="setEventsTab('upcoming')">Upcoming</button>
        <button class="tab-btn" onclick="setEventsTab('ongoing')">Ongoing</button>
        <button class="tab-btn" onclick="setEventsTab('ended')">Ended</button>
      </div>
    </div>
    <div id="events-list">Memuat events...</div>
  </section>

  <!-- Reels preview kecil di bawah -->
  <section id="reels" class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Reels</h2>
      <small class="small">Preview feed</small>
    </div>
    <div id="reel-list">Memuat reels...</div>
  </section>
</main>

<nav class="bottom-nav">
  <a href="/">Home</a>
  <a href="/news.html">SNEWS</a>
  <a href="/profile.html" id="navProfile">Profile</a>
  <span id="dashNavPlaceholder"></span>
</nav>

<script src="script.js"></script>
</body>
</html>
